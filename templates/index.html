<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hungry Lands</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <h1>🗺️ Hungry Lands</h1>
        <input type="text" id="nickname" placeholder="Nickname" maxlength="20">
        <select id="colorSelect">
            <option value="red">🔴 Red</option>
            <option value="blue">🔵 Blue</option>
            <option value="yellow">🟡 Yellow</option>
            <option value="green">🟢 Green</option>
            <option value="purple">🟣 Purple</option>
            <option value="orange">🟠 Orange</option>
            <option value="pink">🌸 Pink</option>
            <option value="cyan">💠 Cyan</option>
        </select>
        <button onclick="login()">Start Game</button>
        <div id="loginError" class="error"></div>
    </div>
    <div id="gameScreen" class="game-container hidden">
        <div class="score-panel">
            <div id="currentPlayerName"></div>
            <div class="score" id="currentScore">Score: 0</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls">Press WASD once to start moving. Trail appears outside your land.</div>
    </div>
    <script src="/static/game.js"></script>
</body>
</html>
